<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Map - Screen 1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="controls">
        <button class="screen-btn active" type="button" data-screen="1">Screen 1</button>
        <button class="screen-btn" type="button" data-screen="2">Screen 2</button>
        <button class="screen-btn" type="button" data-screen="3">Screen 3</button>

        <label class="slider-group" for="neighbors" data-controls="1">
          <span>Closest neighbors:</span>
          <span class="slider-with-indicator">
            <input id="neighbors" type="range" min="0" max="20" value="6" />
            <span id="neighbors-connectivity" class="slider-indicator" aria-hidden="true">?</span>
          </span>
          <output id="neighbors-value" for="neighbors">6</output>
        </label>

        <label class="slider-group" for="ship-count" data-controls="1">
          <span>Starships:</span>
          <input id="ship-count" type="range" min="0" max="200" value="100" />
          <output id="ship-count-value" for="ship-count">100</output>
        </label>

        <label class="slider-group" for="ship-speed" data-controls="1">
          <span>Ship speed x:</span>
          <input id="ship-speed" type="range" min="0" max="10" value="5" />
          <output id="ship-speed-value" for="ship-speed">5</output>
        </label>

        <label class="slider-group is-hidden" for="time-accel" data-controls="2">
          <span>Time acceleration:</span>
          <input id="time-accel" type="range" min="0" max="20" value="5" />
          <output id="time-accel-value" for="time-accel">5</output>
        </label>

        <label class="slider-group is-hidden" for="solar-neighbors" data-controls="2">
          <span>Closest neighbors:</span>
          <input id="solar-neighbors" type="range" min="0" max="3" value="1" />
          <output id="solar-neighbors-value" for="solar-neighbors">1</output>
        </label>

        <label class="slider-group is-hidden" for="earth-time-accel" data-controls="3">
          <span>Time acceleration:</span>
          <input id="earth-time-accel" type="range" min="0" max="20" value="5" />
          <output id="earth-time-accel-value" for="earth-time-accel">5</output>
        </label>

        <label class="slider-group is-hidden" for="station-count" data-controls="3">
          <span>Stations:</span>
          <input id="station-count" type="range" min="0" max="200" value="100" />
          <output id="station-count-value" for="station-count">100</output>
        </label>
      </div>

      <div class="screen-wrapper">
        <canvas id="star-canvas" class="screen-canvas" aria-label="Star map screen 1"></canvas>
        <canvas
          id="solar-canvas"
          class="screen-canvas is-hidden"
          aria-label="Solar system map screen 2"
        ></canvas>
        <canvas
          id="earth-canvas"
          class="screen-canvas is-hidden"
          aria-label="Earth local space screen 3"
        ></canvas>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
